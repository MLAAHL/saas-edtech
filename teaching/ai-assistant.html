<!DOCTYPE html>
<html lang="en">

<head>
  <style id="auth-guard">body { opacity: 0 !important; pointer-events: none; }</style>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Assistant</title>

  <link rel="icon" type="image/png" href="logo2.png" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#212121">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Attendance">
  <link rel="apple-touch-icon" href="logo2.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://mlaahl.online" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <script src="js/config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet"
    media="print" onload="this.media='all'" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
    media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </noscript>

  <script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/lib/marked.umd.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.21/jspdf.plugin.autotable.min.js"
    defer></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      overscroll-behavior: none;
    }

    :root {
      --bg-main: #F8FAFC;
      --bg-sidebar: #ffffff;
      --bg-input: #ffffff;
      --bg-user-msg: #6366F1;
      --bg-hover: #F1F5F9;
      --bg-active: #E2E8F0;
      --text-primary: #1E293B;
      --text-secondary: #475569;
      --text-tertiary: #94A3B8;
      --border-light: rgba(0, 0, 0, 0.06);
      --accent: #6366F1;
      --accent-green: #6366F1; /* Repurposed to Indigo */
      --scrollbar: rgba(0, 0, 0, 0.1);
      --table-header-bg: #F8FAFC;
      --table-border: #E2E8F0;
      --table-alt: #ffffff;
      --code-bg: #F1F5F9;
      --blockquote-border: #6366F1;
      --blockquote-bg: rgba(99, 102, 241, 0.05);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      background-attachment: fixed;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded', sans-serif;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* HEADER */
    .app-header {
      height: 72px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      flex-shrink: 0;
      z-index: 50;
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #0F172A;
      flex: 1;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #FFFFFF;
      color: #6366f1;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .icon-btn .material-symbols-rounded {
      font-size: 24px;
      font-weight: 600;
    }

    .icon-btn:hover {
      background: white;
      color: #4f46e5;
      transform: scale(1.05);
    }

    .icon-btn .material-symbols-rounded {
      font-size: 22px;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* WELCOME */
    .welcome-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 160px;
      z-index: 10;
      transition: opacity 0.3s;
      overflow-y: auto;
    }

    .welcome-logo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      position: relative;
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.9);
      border: 4px solid rgba(255, 255, 255, 0.8);
    }
    
    .welcome-logo::after {
      content: '';
      position: absolute;
      bottom: -40px;
      width: 100px;
      height: 14px;
      background: rgba(59, 130, 246, 0.3);
      border-radius: 50%;
      filter: blur(8px);
      animation: shadow 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    @keyframes shadow {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(0.8); opacity: 0.2; }
    }

    .orb-eyes {
      display: flex;
      gap: 20px;
    }

    .orb-eye {
      width: 14px;
      height: 28px;
      background: white;
      border-radius: 10px;
    }

    .welcome-heading {
      font-size: 26px;
      font-weight: 500;
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 22px;
      font-weight: 400;
      color: #1e3a8a;
      text-align: center;
      margin-bottom: 40px;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 480px;
      width: 100%;
    }

    .suggestion-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    .suggestion-card:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
    }

    .suggestion-card .material-symbols-rounded {
      color: #3b82f6;
      font-size: 20px;
    }

    .suggestion-title {
      font-size: 14px;
      font-weight: 500;
      color: #1e3a8a;
    }

    .suggestion-desc {
      display: none;
    }

    /* MESSAGES */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 160px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .messages-container.active {
      opacity: 1;
      pointer-events: all;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 3px;
    }

    .msg {
      max-width: 768px;
      margin: 0 auto;
      padding: 12px 20px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .msg-user .bubble {
      background: linear-gradient(135deg, #ffffff 0%, #eef2ff 100%);
      color: #000000;
      padding: 12px 18px;
      border-radius: 20px 20px 4px 20px;
      font-size: 15px;
      line-height: 1.5;
      max-width: 80%;
      word-wrap: break-word;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
    }

    .msg-ai {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .ai-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 0px;
    }

    .ai-avatar .material-symbols-rounded {
      font-size: 18px;
      color: #6366f1;
    }

    .msg-ai .bubble {
      flex: 1;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.7;
      min-width: 0;
    }

    /* MARKDOWN */
    .msg-ai .bubble h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 18px 0 10px;
    }

    .msg-ai .bubble h1:first-child {
      margin-top: 0;
    }

    .msg-ai .bubble h2 {
      font-size: 17px;
      font-weight: 700;
      margin: 16px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-light);
    }

    .msg-ai .bubble h2:first-child {
      margin-top: 0;
    }

    .msg-ai .bubble h3 {
      font-size: 15px;
      font-weight: 600;
      margin: 14px 0 6px;
    }

    .msg-ai .bubble p {
      margin: 6px 0;
    }

    .msg-ai .bubble strong {
      font-weight: 600;
      color: var(--text-primary);
    }

    .msg-ai .bubble ul,
    .msg-ai .bubble ol {
      padding-left: 20px;
      margin: 8px 0;
    }

    .msg-ai .bubble li {
      margin-bottom: 4px;
      color: var(--text-secondary);
    }

    .msg-ai .bubble li::marker {
      color: var(--accent-green);
    }

    .msg-ai .bubble code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .msg-ai .bubble pre {
      background: var(--code-bg);
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .msg-ai .bubble pre code {
      background: none;
      padding: 0;
    }

    .msg-ai .bubble blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding: 8px 14px;
      margin: 8px 0;
      background: var(--blockquote-bg);
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .msg-ai .bubble blockquote p {
      margin: 0;
    }

    .msg-ai .bubble hr {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 14px 0;
    }

    /* ══════════ SUGGESTION CHIPS (IN CHAT) ══════════ */
    .chat-suggestions-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    .chat-suggestion-chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chat-suggestion-chip:before {
      content: '💡';
      font-size: 12px;
    }

    .chat-suggestion-chip:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    /* TABLES */
    .msg-ai .bubble table {
      width: 100%;
      display: block;
      overflow-x: auto;
      border-collapse: collapse;
      border: 1px solid var(--table-border);
      border-radius: 10px;
      margin: 12px 0;
      font-size: 13px;
      white-space: nowrap;
    }

    .msg-ai .bubble th,
    .msg-ai .bubble td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--table-border);
      text-align: left;
    }

    .msg-ai .bubble tr:last-child td {
      border-bottom: none;
    }

    .msg-ai .bubble tr:nth-child(even) {
      background: var(--table-alt);
    }

    .msg-ai .bubble th {
      font-weight: 600;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--table-header-bg);
      color: var(--text-primary);
    }

    .table-export-wrap {
      margin: 12px 0;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-export-wrap .table-scroll {
      padding: 0;
      overflow-x: auto;
    }

    .table-export-wrap table {
      margin: 0;
      border: none;
      border-radius: 0;
    }

    .table-export-footer {
      display: flex;
      justify-content: flex-end;
      padding: 6px 10px;
      background: var(--bg-input);
      border-top: 1px solid var(--border-light);
      position: relative;
    }

    .table-export-trigger {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-tertiary);
      border-radius: 6px;
      transition: all 0.15s;
    }

    .table-export-trigger:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .table-export-dropdown {
      position: absolute;
      right: 10px;
      bottom: 38px;
      background: var(--bg-main);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      z-index: 1000;
      display: none;
      flex-direction: column;
      padding: 4px;
      min-width: 140px;
    }

    .table-export-dropdown.show {
      display: flex;
    }

    .table-export-dropdown-item {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .table-export-dropdown-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .table-export-dropdown-item .material-symbols-rounded {
      font-size: 18px;
    }

    /* INPUT */
    .input-wrap {
      position: absolute;
      bottom: 96px;
      left: 16px;
      right: 16px;
      z-index: 100;
    }

    .input-box {
      max-width: 768px;
      margin: 0 auto;
      background: #FFFFFF;
      border: none;
      border-radius: 40px;
      padding: 10px 10px 10px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .input-box:focus-within {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .input-field {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 16px;
      color: #0F172A;
      padding: 10px 0;
      outline: none;
      font-family: inherit;
    }

    .input-field::placeholder {
      color: #94A3B8;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #6366f1;
      color: #ffffff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .send-btn:disabled {
      background: #E8F0FE;
      color: #ffffff;
      cursor: not-allowed;
      transform: scale(0.95);
    }

    .send-btn:not(:disabled):hover {
      opacity: 0.85;
    }

    .send-btn:not(:disabled):active {
      transform: scale(0.92);
    }

    .send-btn .material-symbols-rounded {
      font-size: 20px;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: var(--bg-main);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      z-index: 999;
    }

    [data-theme="dark"] .bottom-nav {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-tertiary);
      border: none;
      background: transparent;
      padding: 6px 12px;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex: 1;
    }

    .nav-item:hover {
      color: var(--text-secondary);
    }

    .nav-item.active {
      background: #1E293B;
      color: white;
      box-shadow: 0 4px 14px -3px rgba(30, 41, 59, 0.4);
    }

    .nav-item .material-symbols-rounded {
      font-size: 24px;
      font-variation-settings: 'FILL' 0;
      transition: all 0.3s;
    }

    .nav-item.active .material-symbols-rounded {
      font-variation-settings: 'FILL' 1;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
      transition: all 0.3s;
    }

    /* TYPING */
    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 8px 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* SCROLL BTN */
    .scroll-bottom-btn {
      position: absolute;
      bottom: 156px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 50;
    }

    .scroll-bottom-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) scale(1);
    }

    .scroll-bottom-btn:hover {
      background: var(--bg-hover);
    }

    .scroll-bottom-btn .material-symbols-rounded {
      font-size: 20px;
    }

    /* DRAWER */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .drawer-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: -300px;
      bottom: 0;
      width: 280px;
      max-width: 80vw;
      background: var(--bg-sidebar);
      z-index: 2001;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .drawer.show {
      left: 0;
    }

    .drawer-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drawer-header h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .drawer-item {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .drawer-item:hover {
      background: var(--bg-hover);
    }

    .drawer-item.active {
      background: var(--bg-active);
      border-color: var(--border-light);
    }

    .drawer-item-text {
      flex: 1;
      overflow: hidden;
    }

    .drawer-item-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .drawer-item-time {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .drawer-item-del {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.15s;
      margin-left: 6px;
    }

    .drawer-item:hover .drawer-item-del {
      opacity: 0.7;
    }

    .drawer-item-del:hover {
      opacity: 1 !important;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    /* DESKTOP */
    @media (min-width: 769px) {
      .app-header {
        padding: 0 24px;
      }

      .msg {
        padding: 14px 40px;
      }

      .input-wrap {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        max-width: 768px;
        width: calc(100% - 48px);
      }

      .bottom-nav {
        max-width: 500px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>
  <div class="app-header">
    <div class="header-left">
      <button class="icon-btn" id="menuBtn" aria-label="Menu"><span
          class="material-symbols-rounded">menu</span></button>
    </div>
    <div class="header-title">AI Assistant</div>
    <div class="header-right">
      <button class="icon-btn" id="newChatBtn" aria-label="New Chat"><span
          class="material-symbols-rounded">edit_square</span></button>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h3>History</h3>
      <button class="icon-btn" id="drawerClose"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="drawer-list" id="drawerList"></div>
  </div>

  <div class="chat-area">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-logo">
        <div class="orb-eyes">
          <div class="orb-eye"></div>
          <div class="orb-eye"></div>
        </div>
      </div>
      
      <h2 class="welcome-heading" id="welcomeHeading">Hi, there!</h2>
      <p class="welcome-sub">How can I help you today?</p>
    </div>

    <div class="messages-container" id="msgList"></div>

    <button class="scroll-bottom-btn" id="scrollBtn"><span
        class="material-symbols-rounded">keyboard_arrow_down</span></button>

    <div class="input-wrap">
      <div class="input-box">
        <input type="text" class="input-field" id="msgInput" placeholder="Ask me anything..." autocomplete="off">
        <button class="send-btn" id="sendBtn" disabled><span class="material-symbols-rounded">arrow_upward</span></button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="myclass.html" class="nav-item"><span class="material-symbols-rounded">home</span><span
        class="nav-label">Home</span></a>
    <a href="myclass.html#subjects" class="nav-item"><span class="material-symbols-rounded">menu_book</span><span
        class="nav-label">Subjects</span></a>
    <a href="myclass.html#history" class="nav-item"><span class="material-symbols-rounded">history</span><span
        class="nav-label">History</span></a>
    <a href="ai-assistant.html" class="nav-item active"><span class="material-symbols-rounded">auto_awesome</span><span
        class="nav-label">AI</span></a>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { firebaseConfig } from './firebase-config.js';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.firebaseAuth = auth;
    onAuthStateChanged(auth, async user => {
      if (!user) return window.location.replace('index.html');
      const authGuard = document.getElementById('auth-guard');
      if (authGuard) authGuard.remove();
      const email = user.email;
      let displayName = email.split('@')[0].replace(/[._]/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      try {
        const token = await user.getIdToken();
        const res = await fetch(window.APP_CONFIG.API_BASE_URL + '/teacher/profile/email/' + encodeURIComponent(email), {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const data = await res.json();
        if (data.success && data.teacher && data.teacher.name) displayName = data.teacher.name;
      } catch (e) { }
      const el = document.getElementById('welcomeHeading');
      if (el) el.textContent = 'Hi, ' + displayName + '!';
    });
  </script>

  <script>
    const API_BASE = window.APP_CONFIG.API_BASE_URL;
    const CHAT_EP = '/chatbot/chat';
    const SESSION_TTL = 86400000;

    let convHistory = [];
    let sessionId = Date.now().toString();
    let isFirst = true;
    let isSending = false;

    const msgList = document.getElementById('msgList');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const scrollBtn = document.getElementById('scrollBtn');

    // Send button state
    msgInput.addEventListener('input', function () {
      sendBtn.disabled = !msgInput.value.trim() || isSending;
    });

    // Scroll detection
    msgList.addEventListener('scroll', function () {
      var d = msgList.scrollHeight - msgList.scrollTop - msgList.clientHeight;
      scrollBtn.classList.toggle('visible', d > 200);
    });
    scrollBtn.addEventListener('click', scrollToBottom);

    function scrollToBottom() {
      msgList.scrollTo({ top: msgList.scrollHeight, behavior: 'smooth' });
    }

    // Drawer
    function toggleDrawer() {
      document.getElementById('drawerOverlay').classList.toggle('show');
      document.getElementById('drawer').classList.toggle('show');
    }
    document.getElementById('menuBtn').addEventListener('click', toggleDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', toggleDrawer);
    document.getElementById('drawerClose').addEventListener('click', toggleDrawer);

    function getHistory() {
      try {
        var raw = localStorage.getItem('ai_chat_sessions');
        var s = raw ? JSON.parse(raw) : [];
        var now = Date.now();
        s = s.filter(function (x) { return (now - x.lastUpdated) < SESSION_TTL; });
        localStorage.setItem('ai_chat_sessions', JSON.stringify(s));
        return s;
      } catch (e) { return []; }
    }

    function saveSession() {
      if (convHistory.length === 0) return;
      var sessions = getHistory();
      var idx = -1;
      for (var i = 0; i < sessions.length; i++) { if (sessions[i].id === sessionId) { idx = i; break; } }
      var data = { id: sessionId, title: convHistory[0].content, lastUpdated: Date.now(), history: convHistory, html: msgList.innerHTML, isFirst: isFirst };
      if (idx >= 0) sessions[idx] = data;
      else sessions.unshift(data);
      localStorage.setItem('ai_chat_sessions', JSON.stringify(sessions));
      renderDrawer();
    }

    function renderDrawer() {
      var sessions = getHistory();
      var list = document.getElementById('drawerList');
      if (!sessions.length) { list.innerHTML = '<div style="text-align:center;color:var(--text-tertiary);font-size:13px;padding:24px;">No history yet.</div>'; return; }
      var html = '';
      for (var i = 0; i < sessions.length; i++) {
        var s = sessions[i];
        var mins = Math.floor((Date.now() - s.lastUpdated) / 60000);
        var t = mins < 1 ? 'Just now' : mins < 60 ? mins + 'm ago' : mins < 1440 ? Math.floor(mins / 60) + 'h ago' : '1d+ ago';
        html += '<div class="drawer-item ' + (s.id === sessionId ? 'active' : '') + '" data-id="' + s.id + '">';
        html += '<div class="drawer-item-text" onclick="loadSession(\'' + s.id + '\')">';
        html += '<div class="drawer-item-title">' + s.title.replace(/</g, '&lt;') + '</div>';
        html += '<div class="drawer-item-time">' + t + '</div></div>';
        html += '<button class="drawer-item-del" onclick="deleteSession(event,\'' + s.id + '\')" aria-label="Delete"><span class="material-symbols-rounded" style="font-size:16px;">delete</span></button></div>';
      }
      list.innerHTML = html;
    }

    window.loadSession = function (id) {
      var sessions = getHistory();
      var s = null;
      for (var i = 0; i < sessions.length; i++) { if (sessions[i].id === id) { s = sessions[i]; break; } }
      if (!s) return;
      sessionId = s.id;
      convHistory = s.history || [];
      msgList.innerHTML = s.html || '';
      isFirst = s.isFirst !== undefined ? s.isFirst : false;
      if (!isFirst) { welcomeScreen.style.display = 'none'; msgList.classList.add('active'); scrollToBottom(); }
      else { welcomeScreen.style.display = ''; welcomeScreen.style.opacity = '1'; msgList.classList.remove('active'); }
      renderDrawer();
      toggleDrawer();
    };

    window.deleteSession = function (e, id) {
      e.stopPropagation();
      var sessions = getHistory().filter(function (s) { return s.id !== id; });
      localStorage.setItem('ai_chat_sessions', JSON.stringify(sessions));
      if (id === sessionId) newChat();
      else renderDrawer();
    };

    function newChat() {
      convHistory = []; sessionId = Date.now().toString();
      msgList.innerHTML = ''; msgList.classList.remove('active');
      welcomeScreen.style.display = ''; welcomeScreen.style.opacity = '1';
      isFirst = true; isSending = false; sendBtn.disabled = true;
      renderDrawer();
    }
    document.getElementById('newChatBtn').addEventListener('click', newChat);
    window.newChat = newChat;

    function addMsg(html, type, suggestions = []) {
      var div = document.createElement('div');
      div.className = 'msg msg-' + type;
      var processed = html;
      if (type === 'ai' && html.indexOf('<table') !== -1) {
        processed = processed.replace(/<table[\s\S]*?<\/table>/g, function (match) {
          return '<div class="table-export-wrap"><div class="table-scroll">' + match + '</div><div class="table-export-footer"><div class="table-export-trigger" onclick="toggleExport(this)"><span class="material-symbols-rounded">more_vert</span></div><div class="table-export-dropdown"><div class="table-export-dropdown-item" onclick="exportExcel(this)"><span class="material-symbols-rounded">description</span> Excel</div><div class="table-export-dropdown-item" onclick="exportPDF(this)"><span class="material-symbols-rounded">picture_as_pdf</span> PDF</div></div></div></div>';
        });
      }

      let suggestionsHtml = '';
      if (type === 'ai' && suggestions && suggestions.length > 0) {
        suggestionsHtml = `<div class="chat-suggestions-container">` +
          suggestions.map(s => `<button class="chat-suggestion-chip" onclick="ask('${s}')">${s}</button>`).join('') +
          `</div>`;
      }

      if (type === 'ai') {
        div.innerHTML = '<div class="ai-avatar"><span class="material-symbols-rounded">auto_awesome</span></div><div class="bubble">' + processed + suggestionsHtml + '</div>';
      } else {
        div.innerHTML = '<div class="bubble">' + processed + '</div>';
      }
      msgList.appendChild(div);
      scrollToBottom();
    }

    window.toggleExport = function (el) {
      var dd = el.nextElementSibling;
      var wasOpen = dd.classList.contains('show');
      document.querySelectorAll('.table-export-dropdown').forEach(function (d) { d.classList.remove('show'); });
      if (!wasOpen) dd.classList.add('show');
    };
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.table-export-wrap')) {
        document.querySelectorAll('.table-export-dropdown').forEach(function (d) { d.classList.remove('show'); });
      }
    });
    window.exportExcel = function (el) {
      try { var t = el.closest('.table-export-wrap').querySelector('table'); var wb = XLSX.utils.table_to_book(t, { sheet: "Report" }); XLSX.writeFile(wb, "AI_Report.xlsx"); } catch (e) { alert("Export failed"); }
      el.closest('.table-export-dropdown').classList.remove('show');
    };
    window.exportPDF = function (el) {
      try { var jsPDF = window.jspdf.jsPDF; var doc = new jsPDF(); var t = el.closest('.table-export-wrap').querySelector('table'); doc.autoTable({ html: t, theme: 'grid', headStyles: { fillColor: [16, 163, 127] }, styles: { fontSize: 8 } }); doc.save("AI_Report.pdf"); } catch (e) { alert("Export failed"); }
      el.closest('.table-export-dropdown').classList.remove('show');
    };

    function showTyping() {
      var div = document.createElement('div');
      div.className = 'msg msg-ai'; div.id = 'typingMsg';
      div.innerHTML = '<div class="ai-avatar"><span class="material-symbols-rounded">auto_awesome</span></div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
      msgList.appendChild(div); scrollToBottom();
    }
    function hideTyping() { var el = document.getElementById('typingMsg'); if (el) el.remove(); }

    async function send() {
      var txt = msgInput.value.trim();
      if (!txt || isSending) return;
      if (isFirst) { welcomeScreen.style.opacity = '0'; setTimeout(function () { welcomeScreen.style.display = 'none'; }, 300); msgList.classList.add('active'); isFirst = false; }
      msgInput.value = ''; msgInput.blur();
      isSending = true; sendBtn.disabled = true;
      addMsg(txt.replace(/</g, '&lt;'), 'user');
      convHistory.push({ role: 'user', content: txt });
      showTyping();
      try {
        var token = '';
        if (window.firebaseAuth && window.firebaseAuth.currentUser) {
          token = await window.firebaseAuth.currentUser.getIdToken();
        }
        var headers = { 'Content-Type': 'application/json' };
        if (token) {
          headers['Authorization'] = 'Bearer ' + token;
        }

        var res = await fetch(API_BASE + CHAT_EP, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ question: txt, history: convHistory.slice(0, -1) })
        });
        var data = await res.json();
        hideTyping();
        if (data.success) {
          var content = data.answer;
          if (typeof marked !== 'undefined') content = marked.parse(content);
          addMsg(content, 'ai', data.suggestions);
          convHistory.push({ role: 'assistant', content: data.answer, suggestions: data.suggestions });
          if (convHistory.length > 40) convHistory = convHistory.slice(-40);
          saveSession();
        } else {
          addMsg('Sorry, I encountered an error. Please try again.', 'ai');
          saveSession();
        }
      } catch (e) {
        hideTyping();
        addMsg('Connection failed. Please check your network.', 'ai');
      } finally {
        isSending = false;
        sendBtn.disabled = !msgInput.value.trim();
      }
    }

    window.ask = function (txt) { msgInput.value = txt; send(); };
    sendBtn.addEventListener('click', send);
    msgInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') send(); });

    // Prevent pull-to-refresh
    var lastTouchY = 0;
    document.addEventListener('touchstart', function (e) { lastTouchY = e.touches[0].clientY; }, { passive: true });
    document.addEventListener('touchmove', function (e) {
      if (e.touches[0].clientY > lastTouchY && msgList.scrollTop <= 0) e.preventDefault();
    }, { passive: false });

    renderDrawer();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => { console.log('SW registered'); setInterval(() => reg.update(), 60000); })
          .catch(err => console.log('Service Worker registration failed', err));
      });
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'SW_UPDATED') window.location.reload();
      });
    }
  </script>
</body>

</html>
