<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parents Portal - Launch Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #1e1b4b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      padding: 20px;
      overflow: hidden;
    }

    /* Ambient background glows */
    .glow-blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--primary);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      z-index: 0;
      animation: float 10s infinite alternate ease-in-out;
    }

    .glow-blob.top { top: -100px; right: -50px; background: #8b5cf6; }
    .glow-blob.bottom { bottom: -100px; left: -50px; background: #3b82f6; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 30px) scale(1.1); }
    }

    .gateway-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: all 0.4s ease;
    }

    .icon-container {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-container svg {
      width: 32px;
      height: 32px;
      color: #a78bfa;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: var(--primary);
    }

    select option {
      background: var(--bg-gradient-start);
      color: white;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: white;
      box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.8);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-disabled {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      cursor: not-allowed;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-box {
      margin-top: 24px;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-wait {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }

    .status-open {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .countdown {
      font-size: 24px;
      font-weight: 700;
      margin-top: 8px;
      display: block;
      color: white;
    }

  </style>
</head>
<body>

  <div class="glow-blob top"></div>
  <div class="glow-blob bottom"></div>

  <div class="gateway-card">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
    </div>
    
    <h1>Launch Gateway</h1>
    <p class="subtitle">To ensure a smooth setup experience, we are staggering logins by stream. Please select your stream below.</p>

    <div class="input-group">
      <label for="streamSelect">Select Your Stream</label>
      <select id="streamSelect">
        <option value="" disabled selected>Tap to select...</option>
        <option value="BCA">BCA (Bachelors in Computer Apps)</option>
        <option value="BBA">BBA (Bachelors in Business Admin)</option>
        <option value="BCOM">BCOM (Bachelors in Commerce)</option>
        <option value="BSC">BSC (Bachelors in Science)</option>
      </select>
    </div>

    <button id="checkBtn" class="btn btn-primary" onclick="checkStatus()">
      Check Access
    </button>
    <button id="enterAppBtn" class="btn btn-primary" style="display: none;" onclick="goToApp()">
      Download / Open App
      <svg xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
      </svg>
    </button>

    <div id="statusBox" class="status-box">
      <!-- Status text injected via JS -->
    </div>
  </div>

  <script>
    // ==================================================
    // CONFIGURATION: Set the unlock times for each stream
    // Format: "YYYY-MM-DDTHH:MM:00" (24-hour time)
    // ==================================================
    const unlockSchedule = {
      "BCA": new Date("2026-06-25T09:00:00"), // Opens tomorrow at 9:00 AM
      "BBA": new Date("2026-06-25T10:00:00"), // Opens tomorrow at 10:00 AM
      "BCOM": new Date("2026-06-25T11:00:00"), // Opens tomorrow at 11:00 AM
      "BSC": new Date("2026-06-25T12:00:00")   // Opens tomorrow at 12:00 PM
    };

    // Replace this with your actual Playstore link or Web App link
    const APP_LINK = "https://parents.mlaahl.online";

    let countdownInterval;

    function checkStatus() {
      const select = document.getElementById('streamSelect');
      const stream = select.value;
      const statusBox = document.getElementById('statusBox');
      const checkBtn = document.getElementById('checkBtn');
      const enterAppBtn = document.getElementById('enterAppBtn');

      if (!stream) {
        alert("Please select a stream first.");
        return;
      }

      clearInterval(countdownInterval);
      const unlockTime = unlockSchedule[stream];
      
      const updateClock = () => {
        const now = new Date();
        const diff = unlockTime - now;

        if (diff <= 0) {
          // OPEN!
          clearInterval(countdownInterval);
          statusBox.className = 'status-box status-open';
          statusBox.style.display = 'block';
          statusBox.innerHTML = `<strong>${stream} is now open!</strong><br>You can now proceed to login.`;
          
          checkBtn.style.display = 'none';
          enterAppBtn.style.display = 'flex';
          select.disabled = true;
        } else {
          // WAITING
          statusBox.className = 'status-box status-wait';
          statusBox.style.display = 'block';
          
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          
          statusBox.innerHTML = `
            ${stream} logins are currently locked. 
            <br>Opens in:
            <span class="countdown">${hours}h ${minutes}m ${seconds}s</span>
          `;
          
          checkBtn.style.display = 'flex';
          enterAppBtn.style.display = 'none';
        }
      };

      updateClock();
      countdownInterval = setInterval(updateClock, 1000);
    }

    function goToApp() {
      window.location.href = APP_LINK;
    }
    
    // Automatically reset when changing stream
    document.getElementById('streamSelect').addEventListener('change', () => {
      document.getElementById('statusBox').style.display = 'none';
      document.getElementById('checkBtn').style.display = 'flex';
      document.getElementById('enterAppBtn').style.display = 'none';
      clearInterval(countdownInterval);
    });
  </script>

</body>
</html>
