<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Attendance Register | Smart Attendance</title>

    <link rel="icon" type="image/png" href="logo1.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0C0C0E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Attendance">
    <link rel="apple-touch-icon" href="logo1.png">

    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://admin.mlaahl.online" crossorigin>
    <link rel="preconnect" href="https://cdn.sheetjs.com" crossorigin>

    <script src="js/config.js"></script>

    <!-- Async font loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
        media="print" onload="this.media='all'" />
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
    </noscript>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js" defer></script>

    <style>
        :root {
            --bg-root: #0C0C0E;
            --bg-sidebar: #111113;
            --bg-surface: #161618;
            --bg-card: #1A1A1D;
            --bg-card-hover: #1F1F22;
            --bg-elevated: #242427;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.09);
            --text-primary: #E8E8EC;
            --text-secondary: #8A8A92;
            --text-muted: #4E4E56;
            --green: #34D399;
            --green-dim: rgba(52, 211, 153, 0.15);
            --red: #F87171;
            --red-dim: rgba(248, 113, 113, 0.15);
            --amber: #FBBF24;
            --amber-dim: rgba(251, 191, 36, 0.15);
            --purple: #A78BFA;
            --purple-dim: rgba(167, 139, 250, 0.12);
            --blue: #60A5FA;
            --blue-dim: rgba(96, 165, 250, 0.15);
            --sidebar-w: 220px;
            --primary-gradient: linear-gradient(135deg, #6366F1, #A78BFA);
        }

        /* Material Icons */
        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded', sans-serif;
            overflow: hidden;
            width: 1em;
            height: 1em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-root);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════ SIDEBAR ══════════ */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar {
            width: 0;
        }

        .sb-logo {
            padding: 4px 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .sb-logo img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .sb-group {
            margin-bottom: 8px;
        }

        .sb-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
        }

        .sb-link:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .sb-link.active {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            font-weight: 600;
        }

        .sb-link .material-symbols-rounded {
            font-size: 18px;
        }

        .sb-divider {
            height: 1px;
            background: var(--border);
            margin: 12px 8px;
        }

        .sb-bottom {
            margin-top: auto;
            padding-top: 12px;
        }

        .sb-logout {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s;
        }

        .sb-logout:hover {
            background: var(--red-dim);
            color: var(--red);
        }

        .sb-logout .material-symbols-rounded {
            font-size: 18px;
        }

        /* ══════════ MAIN ══════════ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 24px 32px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .topbar h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .topbar-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
        }

        .avatar-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366F1, #A78BFA);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }

        .avatar-info .av-name {
            font-size: 11px;
            font-weight: 600;
        }

        .avatar-info .av-email {
            font-size: 9px;
            color: var(--text-muted);
        }

        .scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 40px;
        }

        .scroll::-webkit-scrollbar {
            width: 4px;
        }

        .scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }

        /* HEADER */
        .page-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title .material-symbols-rounded {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-variation-settings: 'FILL' 1;
        }

        .page-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* BUTTONS */
        .modern-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-text {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-text:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .btn-success {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .btn-success:hover {
            background: rgba(52, 211, 153, 0.25);
        }

        .btn-danger {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.25);
        }

        /* STATS BAR */
        #attendanceStats {
            margin: 0 0 15px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card-mini {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-card-mini .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-card-mini .stat-icon .material-symbols-rounded {
            font-size: 18px;
        }

        .stat-card-mini .stat-value {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .stat-card-mini .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* TABLE LAYOUT */
        #registerTable {
            margin: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .modern-table-container {
            overflow-x: auto;
            width: 100%;
            position: relative;
            border-radius: 0 0 16px 16px;
            transform: rotateX(180deg);
            /* Move scrollbar to top */
            -ms-overflow-style: none;
        }

        .modern-table-container::-webkit-scrollbar {
            height: 6px;
        }

        .modern-table-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .modern-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            transform: rotateX(180deg);
            /* Flip content back */
        }

        .modern-table th,
        .modern-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            white-space: nowrap;
        }



        .modern-table tbody tr {
            transition: background 0.15s;
        }

        .modern-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Column Sizing */
        .modern-table th:nth-child(1),
        .modern-table td:nth-child(1) {
            width: 50px;
            min-width: 50px;
            text-align: center;
        }

        .modern-table th:nth-child(2),
        .modern-table td:nth-child(2) {
            width: 140px;
            min-width: 140px;
            font-weight: 600;
        }

        .modern-table th:nth-child(3),
        .modern-table td:nth-child(3) {
            width: 180px;
            min-width: 180px;
            font-weight: 600;
        }

        .modern-table thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-surface);
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .modern-table tbody tr:hover td {
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .status-chip {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
        }

        .chip-present {
            background: var(--green-dim);
            color: var(--green);
        }

        .chip-absent {
            background: var(--red-dim);
            color: var(--red);
        }

        .time-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* Session selection */
        .session-header {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .session-header:hover {
            background: rgba(167, 139, 250, 0.08) !important;
        }

        .session-header.selected {
            background: var(--purple-dim) !important;
            border-bottom: 2px solid var(--purple) !important;
        }

        /* FILTER BAR */
        .filter-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            margin: 15px 24px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group-compact {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group-compact label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select-compact {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.15s;
        }

        .filter-select-compact:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 2px var(--purple-dim);
        }

        .filter-select-compact option {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        /* TABS */
        .tab-bar {
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .tab-bar button {
            padding: 15px 0;
            border: none;
            background: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            position: relative;
            transition: color 0.2s;
        }

        .tab-bar button:hover {
            color: var(--text-secondary);
        }

        .tab-bar button.active {
            color: var(--purple);
            border-bottom: 2px solid var(--purple);
        }

        /* ACTIONS BAR */
        .actions-bar {
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        #searchContainer input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            width: 250px;
            transition: all 0.15s;
        }

        #searchContainer input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 2px var(--purple-dim);
        }

        #searchContainer input::placeholder {
            color: var(--text-muted);
        }

        /* DATE INPUT  */
        #dateSelector input[type="date"] {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 12px;
        }

        #dateSelector input[type="date"]:focus {
            outline: none;
            border-color: var(--purple);
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            body {
                padding-bottom: 0;
            }

            .page-header {
                padding: 12px 16px;
                flex-direction: row;
                align-items: center;
            }

            .page-title {
                font-size: 16px;
            }

            .page-title .material-symbols-rounded {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }

            .page-subtitle {
                display: none;
            }

            .filter-bar {
                margin: 12px;
                padding: 12px;
                border-radius: 12px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .filter-group-compact {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                width: 100%;
            }

            .filter-select-compact {
                width: 100%;
                min-width: 100%;
                padding: 10px;
            }

            #loadRegisterBtn {
                width: 100%;
                margin: 0 !important;
            }

            #registerTable {
                margin: 0 12px 12px 12px;
                border-radius: 12px;
            }

            #attendanceStats {
                margin: 12px;
            }

            .actions-bar {
                padding: 12px;
                flex-direction: column;
                gap: 10px;
            }

            .actions-bar .flex {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                width: 100%;
            }

            .actions-bar .modern-btn {
                width: 100%;
                margin: 0 !important;
            }

            #searchContainer {
                max-width: 100% !important;
            }

            #searchContainer input {
                width: 100%;
            }

            .modern-table th,
            .modern-table td {
                padding: 10px 12px;
                font-size: 12px;
            }

            .modern-table th:nth-child(1),
            .modern-table td:nth-child(1) {
                width: 40px;
                min-width: 40px;
            }

            .modern-table th:nth-child(2),
            .modern-table td:nth-child(2) {
                width: 110px;
                min-width: 110px;
            }

            .modern-table th:nth-child(3),
            .modern-table td:nth-child(3) {
                width: 140px;
                min-width: 140px;
            }
        }

        .flex {
            display: flex;
        }

        .hidden {
            display: none !important;
        }

        .gap-2 {
            gap: 8px;
        }
    </style>
</head>

<!-- ══════════ MAIN ══════════ -->
<div class="main">
    <header class="topbar">
        <div>
            <h1>Attendance Register</h1>
            <div class="topbar-sub">Historical records and reporting</div>
        </div>
        <div class="topbar-right">
            <div class="avatar-pill">
                <div class="avatar-dot" id="headerAvatar">IT</div>
                <div class="avatar-info">
                    <div class="av-name" id="headerUserFullName"></div>
                    <div class="av-email" id="headerUserEmail"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="scroll">

        <div class="filter-bar" style="margin: 0 0 15px 0;">
            <div class="filter-group-compact">
                <label>STREAM</label>
                <select id="streamSelect" class="filter-select-compact" style="width: 180px;">
                    <option value="">Select Stream</option>
                </select>
            </div>
            <div class="filter-group-compact">
                <label>SEMESTER</label>
                <select id="semesterSelect" class="filter-select-compact" style="width: 120px;" disabled>
                    <option value="">Semester</option>
                </select>
            </div>
            <div class="filter-group-compact">
                <label>SUBJECT</label>
                <select id="subjectSelect" class="filter-select-compact" style="width: 220px;" disabled>
                    <option value="">Subject</option>
                </select>
            </div>
            <button id="loadRegisterBtn" class="modern-btn btn-primary">
                <span class="material-symbols-rounded" style="font-size: 18px;">refresh</span>
                Load
            </button>
        </div>

        <!-- Stats -->
        <div id="attendanceStats" class="hidden">
            <div class="stat-card-mini">
                <div class="stat-icon" style="background: var(--purple-dim); color: var(--purple);">
                    <span class="material-symbols-rounded">calendar_month</span>
                </div>
                <div>
                    <div class="stat-value" id="totalSessions">0</div>
                    <div class="stat-label">Sessions</div>
                </div>
            </div>
            <div class="stat-card-mini">
                <div class="stat-icon" style="background: var(--blue-dim); color: var(--blue);">
                    <span class="material-symbols-rounded">group</span>
                </div>
                <div>
                    <div class="stat-value" id="totalStudents">0</div>
                    <div class="stat-label">Students</div>
                </div>
            </div>
        </div>

        <div id="registerTable" class="hidden">
            <div class="tab-bar">
                <button id="fullRegisterBtn" class="active">Full Register</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { firebaseConfig } from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.firebaseAuth = auth;

    async function fetchTeacherProfile(email) {
        try {
            const url = `${window.APP_CONFIG.API_BASE_URL}/teacher/profile/email/${encodeURIComponent(email)}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.success && data.teacher ? data.teacher : null;
        } catch (error) { return null; }
    }

    function getInitials(name) {
        if (!name) return "AD";
        return name.split(" ").map(n => n[0]).join("").substring(0, 2).toUpperCase();
    }

    function updateUserInfo(displayName, email) {
        const nameEl = document.getElementById('headerUserFullName');
        const emailEl = document.getElementById('headerUserEmail');
        const avatarEl = document.getElementById('headerAvatar');

        if (nameEl) nameEl.textContent = displayName;
        if (emailEl) emailEl.textContent = email;
        if (avatarEl) avatarEl.textContent = getInitials(displayName);
    }

    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
        logoutBtn.onclick = () => {
            signOut(auth).then(() => {
                localStorage.clear();
                sessionStorage.clear();
                window.location.replace("login.html");
            });
        };
    }

    onAuthStateChanged(auth, async (user) => {
        if (user && user.email) {
            let displayName = user.displayName || user.email.split('@')[0];
            const profile = await fetchTeacherProfile(user.email);
            if (profile && profile.name) displayName = profile.name;
            updateUserInfo(displayName, user.email);
        } else {
            window.location.href = 'login.html';
        }
    });
</script>
</body>
